<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F2F2F7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="بصمة HMA" />
  <meta name="description" content="نظام الحضور والانصراف الذكي — هاني محمد عسيري للإستشارات الهندسية" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <title>بصمة HMA</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'IBM Plex Sans Arabic',-apple-system,'Segoe UI',sans-serif;background:#F2F2F7;overflow-x:hidden;-webkit-font-smoothing:antialiased}</style>
</head>
<body>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered:', reg.scope);
        }).catch(err => {
          console.log('SW failed:', err);
        });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install banner after 3 seconds
      setTimeout(() => {
        if (deferredPrompt) {
          const banner = document.createElement('div');
          banner.id = 'pwa-install';
          banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2B5EA7,#1E4478);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;z-index:9999;font-family:Segoe UI,sans-serif;direction:rtl;box-shadow:0 -4px 20px rgba(0,0,0,.3)';
          banner.innerHTML = '<div style="flex:1"><div style="font-size:14px;font-weight:700">📲 ثبّت بصمة HMA</div><div style="font-size:11px;opacity:.7;margin-top:2px">أضف التطبيق لشاشتك الرئيسية</div></div><button id="pwa-btn" style="padding:8px 20px;border-radius:10px;background:#FDD800;color:#1A1A1A;font-size:12px;font-weight:700;border:none;cursor:pointer">تثبيت</button><button id="pwa-close" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:4px">✕</button>';
          document.body.appendChild(banner);
          document.getElementById('pwa-btn').onclick = async () => {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            banner.remove();
          };
          document.getElementById('pwa-close').onclick = () => banner.remove();
        }
      }, 3000);
    });
  </script>
</body>
</html>
