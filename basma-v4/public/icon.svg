<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="50%" stop-color="#2b5ea7"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="14"/>
  <circle cx="256" cy="230" r="120" fill="none" stroke="#5ec47a" stroke-width="14" stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="188" transform="rotate(-90 256 230)"/>
  <!-- Clock hands -->
  <line x1="256" y1="230" x2="256" y2="155" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="310" y2="230" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="230" r="8" fill="#fff"/>
  <!-- Text -->
  <text x="256" y="410" text-anchor="middle" fill="#fff" font-size="48" font-weight="900" font-family="Arial,sans-serif" letter-spacing="4">بصمة</text>
  <text x="256" y="455" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="28" font-weight="700" font-family="Arial,sans-serif" letter-spacing="6">HMA</text>
</svg>
